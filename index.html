<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do list</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<style>

    #userTable tbody{
        font-size: larger;

    }

    .line{
        text-decoration:line-through;
        color:gray;
    }

    .bor-start{
        border-top-left-radius: 20px ;
        border-bottom-left-radius: 20px ;
    }

    .bor-end{
        border-top-right-radius:20px ;
        border-bottom-right-radius: 20px ;
    }

    .top-bar{
        border-top-left-radius: 20px ;
        border-top-right-radius:20px ;
    }



    




</style>
<body>
<div class="container">
    <div class="row">
            <div class="col-3 text-center">
            </div>
        <div class="col-lg-6 text-center mt-5" id="page">

            <form class="d-flex mb-5 mt-5">
                <input type="date" id="taskdate" class="form-control bor-start border-secondary text-dark">
                <input class="form-control border border-secondary ms-1 me-1" placeholder="What I Have To Do" aria-label="Task" id="task" required>
                <button class="btn btn-outline-secondary bor-end" type="button" onclick="work()">➕Add</button>
            </form>
            
            <table id="userTable" class="table">
                <thead>
                    <tr>
                        <h1 class="text-center h1 bg-info bg-gradient ps-3 top-bar p-2 ">📝 My Task Manager</h1>
                        <th>Mark</th>
                        <th class="text-center">Task</th>
                        <th class="text-center">Date</th>
                        <th>Edit</th>
                        <th>Remove</th>
                        <th class="text-center">Status</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
            
        </div>
            <div class="col-3 text-center">
            </div>
    </div>
</div>



</body>
</html>

<script>
    var editIndex= -1;

function work(){

    var task = document.getElementById("task").value;
    var date = document.getElementById("taskdate").value;

    var data = JSON.parse(localStorage.getItem("data")) || [];


    if(editIndex===-1){
    data.push({text:task, date:date, completed:false});
    } else {
    data[editIndex].text=task;
    data[editIndex].date=date;
    alert("Task Updated");
    editIndex= -1;
    }
    localStorage.setItem("data",JSON.stringify(data));

 displaydata();
 clearform();
}

function displaydata(){

    var data = JSON.parse(localStorage.getItem("data")) || [];
    var tablebody = document.querySelector("#userTable tbody");
    tablebody.innerHTML = "";

    data.forEach(function(task,index){
        var row = "<tr>"+
            "<td><input type='checkbox' "+(task.completed ? "checked" : "")+" onchange='toggletask("+index+")'class='form-check-input ms-2'></td>"+
            "<td " + (task.completed?"class='line'":"")+ ">"+task.text+"</td>"+
            "<td " + (task.completed?"":"")+ ">"+task.date+"</td>"+
            "<td><button onclick='edittask("+index+")' class='btn btn-outline-primary ms-2 abc'>Edit</button></td>"+
            "<td><button onclick='removetask("+index+")' class='btn btn-outline-danger ms-2 abc'>❌</button></td>"+
            "<td>"+(task.completed?"Completed✅":"Pending⏳")+"</td>"+
            "</tr>";

            tablebody.innerHTML+=row;    
    });
}

function edittask(index){

    var data = JSON.parse(localStorage.getItem("data"))||[];
    var record = data[index];

    document.getElementById("task").value=record.text;
    editIndex = index;
}

function clearform(){
    document.getElementById("task").value="";
    document.getElementById("taskdate").value="";
}

function removetask(index){
    var data = JSON.parse(localStorage.getItem("data")) ||[];
    data.splice(index,1);
    localStorage.setItem("data",JSON.stringify(data));
    displaydata();
}

function toggletask(index){

    var data = JSON.parse(localStorage.getItem("data")) ||[];
    data[index].completed = !data[index].completed;
    localStorage.setItem("data",JSON.stringify(data));
    displaydata();

}


window.onload = displaydata ;

</script>
